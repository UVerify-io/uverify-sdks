name: 🚀 Publish Java SDK to Maven Central

on:
  push:
    tags:
      - 'java-v*'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔑 Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import

      - name: 🔧 Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.MAVEN_CENTRAL_USERNAME }}",
              "password": "${{ secrets.MAVEN_CENTRAL_TOKEN }}"
            }]

      - name: ✅ Run Tests
        working-directory: ./java
        run: mvn --batch-mode test

      - name: 📦 Build & Publish
        working-directory: ./java
        timeout-minutes: 15
        run: mvn --batch-mode -Prelease -DskipTests deploy
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 🔍 Verify publication
        run: |
          echo "Published io.uverify:uverify-sdk"
          echo "Check: https://central.sonatype.com/artifact/io.uverify/uverify-sdk"
