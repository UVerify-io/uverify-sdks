name: 🧪 Tests

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test-typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: typescript/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./typescript
        run: npm ci

      - name: 🔍 Type Check
        working-directory: ./typescript
        run: npm run typecheck

      - name: ✅ Run Tests
        working-directory: ./typescript
        run: npm test
